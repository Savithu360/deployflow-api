services:
  database:
    image: mysql:8.4
    container_name: deployflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: deployflow
      MYSQL_USER: deployflow
      MYSQL_PASSWORD: deployflow
      MYSQL_ROOT_PASSWORD: deployflow-root
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deployflow-api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: deployflow
      DB_USERNAME: deployflow
      DB_PASSWORD: deployflow
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "java", "-cp", "/app/healthcheck", "HealthCheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql_data:
